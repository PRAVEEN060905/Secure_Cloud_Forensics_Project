input {
  tcp {
    port => 5000
    # Receives logs over TCP and parses incoming JSON data
    codec => json
  }
}

filter {
  # Future log parsing/augmentation can be placed here if needed
}

output {
  # Forwards the logs to Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "cloud-logs-%{+YYYY.MM.dd}"
  }
  
  # Displays the logs in the console for debugging
  stdout { codec => rubydebug }
}
